services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - ./etl/sql:/sql:ro
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_DB_NAME: ${APP_DB_NAME:-interconsultas}
      APP_DB_USER: ${APP_DB_USER:-ips_user}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/tmp_uploads
      - logs:/app/logs
    environment:
      DATABASE_URL: postgresql://${APP_DB_USER:-ips_user}:${APP_DB_PASSWORD}@db:5432/${APP_DB_NAME:-interconsultas}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      SEMAFORO_VERDE_MIN: ${SEMAFORO_VERDE_MIN:-80}
      SEMAFORO_AMARILLO_MIN: ${SEMAFORO_AMARILLO_MIN:-60}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  pgdata:
  uploads:
  logs:
