<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 68" fill="none">

  <!-- ===== ÍCONO IZQUIERDO ===== -->

  <!-- Círculo grande verde oscuro (cuerpo / base) -->
  <circle cx="28" cy="40" r="22" fill="#3a7e1e"/>

  <!-- Círculo mediano verde claro (torso / brazo izquierdo) -->
  <circle cx="36" cy="28" r="18" fill="#5db02a"/>

  <!-- Círculo superior verde brillante (cabeza) -->
  <circle cx="46" cy="16" r="12" fill="#78c83a"/>

  <!-- Pequeño arco blanco que forma el cuello / separación -->
  <circle cx="46" cy="16" r="5" fill="#3a7e1e"/>

  <!-- "IPS" dentro / junto al ícono, pequeño -->
  <text
    x="32" y="44"
    font-family="Arial, Helvetica, sans-serif"
    font-size="8"
    font-weight="900"
    fill="white"
    letter-spacing="1"
  >IPS</text>

  <!-- ===== TEXTO DERECHO ===== -->

  <!-- "Interconsultas" — grande, negrita, azul marino -->
  <text
    x="66" y="46"
    font-family="Arial, Helvetica, sans-serif"
    font-size="28"
    font-weight="700"
    fill="#1A3F72"
  >Interconsultas</text>

</svg>
